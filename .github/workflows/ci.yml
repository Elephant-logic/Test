name: CI - Build Native Plugin & Tests

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build-type: [Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git clang libgtk-3-dev libx11-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake python3

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y cmake

      - name: Configure CMake
        run: |
          cmake -S native -B native/build -DJUCE_USE_CMAKE=ON

      - name: Build (CMake)
        run: |
          cmake --build native/build --config ${{ matrix.build-type }} -- -j 2

      - name: Run DSP tests
        run: |
          ctest --test-dir native/build --output-on-failure

      - name: Upload build artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-${{ matrix.os }}
          path: native/build
