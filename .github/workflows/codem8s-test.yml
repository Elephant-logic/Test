name: Codem8s Backend Test
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Backend smoke test
        shell: bash
        run: |
          (npm start) > codem8s-server.log 2>&1 &
          PID=$!
          sleep 8
          kill -0 $PID
          kill $PID || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codem8s-test-output
          path: |
            codem8s-server.log
            coverage/
            test-results/
          if-no-files-found: ignore
