name: Codem8s Backend Test
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Validate project
        run: echo "No supported backend dependency manifest found"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codem8s-test-output
          path: |
            codem8s-server.log
            coverage/
            test-results/
          if-no-files-found: ignore
